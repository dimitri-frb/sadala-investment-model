<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sadala — Investment Model</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="#" class="brand" aria-label="Sadala — back to portfolio">
      <img src="logo.png" alt="Sadala" class="brand-logo" />
      <span class="brand-name">Sadala</span>
      <span class="brand-tagline">Investment Model</span>
    </a>
    <div class="topbar-right">
      <a href="#" class="back-link" id="back-to-portfolio">← Portfolio</a>
      <div class="opp-picker">
        <label for="opportunity-select">Opportunity:</label>
        <select id="opportunity-select"></select>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-list">
      <button class="tab-btn active" data-tab="summary">Summary</button>
      <button class="tab-btn"        data-tab="hypothesis">Hypothesis</button>
      <button class="tab-btn"        data-tab="pnl">P&amp;L</button>
      <button class="tab-btn"        data-tab="investors">Investors</button>
    </div>
    <div class="scenario-picker global">
      <label for="global-scenario-select">Scenario:</label>
      <select id="global-scenario-select">
        <option value="worst">Worst case</option>
        <option value="base">Base case</option>
        <option value="best">Best case</option>
      </select>
    </div>
  </nav>

  <main id="main"></main>

  <!-- One file per project. Order here controls order in the dropdown. -->
  <script src="data/el-cantal.js"></script>
  <script src="data/san-anton-50.js"></script>
  <script src="data/bolivia.js"></script>
  <script src="data/stradivarius-30.js"></script>
  <script src="app.js"></script>
</body>
</html>
